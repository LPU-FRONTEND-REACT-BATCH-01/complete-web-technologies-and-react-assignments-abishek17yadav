<script>


function finalAmount(price) {
  let discount = 0;

  if (price > 6000) {
    discount = 0.25;
  } 
  
  else if (price > 2000) {
    discount = 0.15;
  } 
  
  else {
    discount = 0;
  }

  let finalPrice = price - (price * discount);
  console.log("the final price is "+finalPrice);
}

finalAmount(6500);



</script>

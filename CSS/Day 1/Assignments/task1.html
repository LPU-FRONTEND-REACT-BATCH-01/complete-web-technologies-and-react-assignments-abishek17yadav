<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .biryani > li{
            color: brown;
        }
        

        li + h1{
            color: grey;
        }

        .chicken + li{
            color: aqua;
        }

        .lassi > li{
            color: rgb(20, 159, 62);
        }

        .chicken > ul > li{
            color: black;
        }

        .sugar > ul > li{
            color: brown;
        }

    </style>
</head>
<body>
    <ul class="biryani">
        <h1>Biryani Ingredients</h1>
        <li>Rice</li>
        <li>Chicken</li>


        <div class="chicken">
            <ul>
                <li>Fried</li>
                <li>Grilled</li>
            </ul>
        </div>
        <li>Paneer</li>
        <h1>Fighter Jet</h1>
        <li>Spices</li>
        <li>Gas</li>
    </ul>



    <ul class="lassi">
        <h1>Lassi Ingredients</h1>
        <li>Curd</li>
        <li>Water</li>
        <li>Sugar</li>

        <div class="sugar">
            <ul>
                <li>White</li>
                <li>Brown</li>
            </ul>
        </div>

        <li>Malai</li>
    </ul>

</body>



</html>

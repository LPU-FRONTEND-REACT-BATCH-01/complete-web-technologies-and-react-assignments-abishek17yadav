<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        a:visited{
            color: rgb(0, 109, 128);
        }


        a:active{
            color: rgb(255, 251, 0);
        }

        a:link{
            color: rgb(255, 0, 0);
        }

        a:hover
        {
            color: rgb(255, 0, 251);
        }


input:focus {
    background-color: rgb(0, 10, 0);
    border: 10px solid rgb(255, 0, 0);
}

p::before {
  content: "1st make  ";
  color: rgb(255, 0, 0);
}

p::after {
  content: " Then have it and sleep ";
  color: blue;
}

    </style>
</head>
<body>


    <a href="https://www.amazon.com/">Amazon</a>

    <input type="text">


<p>Paneer</p>
<p>Chicken</p>
</body>
</html>

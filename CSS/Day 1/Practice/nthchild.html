<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        ul li:first-child{
            background-color: red;
        }
        ul li:last-child{
            background-color: red;
        }
        ul li:nth-child(3){
            background-color: red;
        }

        ul li:first-of-type{
            background-color: blue;
        }
        ul h1:last-of-type{
            background-color: blue;
        }
        ul h1:nth-of-type(2){
            background-color: blue;
        }
    </style>
</head>
<body>
    <ul>
        <h1>1st</h1>
        <li>2nd</li>
        <li>3rd</li>
        <li>4th</li>
        <li>5th</li>
        <li>6th</li>
        <h1>7th</h1>
        <li>8th</li>
        <h1>9th</h1>
        <li>10th</li>
    </ul>
</body>
</html>

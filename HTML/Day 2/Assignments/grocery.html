<head>

</head>
<body>

    <h2>Grocery List</h2>

    <table border="1" border-collapse="collapse" cellpadding="10">

            <th>Quantity</th>
            <th>Price</th>
        </tr>

        <tr>
            <td>Milk</td>
            <td>2 Liters</td>

        </tr>

        <tr>

        </tr>

        <tr>
            <td>Eggs</td>
            <td>12</td>
            <td>₹90</td>
        </tr>

        <tr>
            <td>Rice</td>
            <td>5 Kg</td>
            <td>₹300</td>
        </tr>
        <tr>
            <td>Oil</td>
            <td>1 litres</td>
            <td>₹170</td>
        </tr>

    </table>

</html>

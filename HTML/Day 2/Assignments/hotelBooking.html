<!DOCTYPE html>
<html>
<head>
    <title>Hotel Booking Form</title>
</head>
<body>

<h2>Hotel Booking Form</h2>

<form>

    <!-- Name -->
    <label>Name:</label><br>
    <input type="text" placeholder="First Name">
    <input type="text" placeholder="Last Name"><br><br>

    <!-- Gender -->
    <label>Gender:</label>
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female<br><br>

    <!-- Email -->
    <label>Email:</label><br>
    <input type="email" placeholder="abc@gmail.com"><br><br>

    <!-- Room Type -->
    <label>Room Type:</label><br>
    <select>
        <option>Select</option>
        <option>Single</option>
        <option>Double</option>
        <option>XL</option>
    </select><br><br>

    <!-- Guests -->
    <label>Number of Guests:</label><br>
    <input type="number" min="1" max="10"><br><br>

    <!-- Arrival -->
    <label>Arrival Date & Time:</label><br>
    <input type="date">
    <input type="time"><br><br>

    <!-- Departure -->
    <label>Departure Date:</label><br>
    <input type="date"><br><br>

    <!-- City -->
    <label>City:</label><br>
    <select>
        <option>Select City</option>
        <option>Delhi</option>
        <option>Mumbai</option>
        <option>Pune</option>
    </select><br><br>

    <!-- File Upload -->
    <label>Upload Aadhar Card:</label><br>
    <input type="file"><br><br>

    <!-- Range -->
    <label>Budget Range:</label><br>
    <input type="range" min="1000" max="10000"><br><br>

    <!-- Terms -->
    <input type="checkbox"> Agree terms and conditions<br><br>

    <!-- Special Request -->
    <label>Special Requests:</label><br>
    <textarea></textarea><br><br>

    <!-- Submit -->
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>

</body>
</html>

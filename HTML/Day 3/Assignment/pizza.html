<!DOCTYPE html>
<html>
<head>
    <title>Pizza Mania</title>
</head>
<body>

    <h1>Pizza Mania</h1>
    <h2>Pizza Order Here</h2>

    <form>

        Full Name:<br>
        <input type="text" placeholder="Enter your name"><br><br>

        Last Name:<br>
        <input type="text" placeholder="Enter your last name"><br><br>

        Email:<br>
        <input type="email" placeholder="Enter your email"><br><br>

        Contact:<br>
        <input type="tel" placeholder="Enter your contact number"><br><br>

        Preferred Delivery Date:<br>
        <input type="date"><br><br>

        <!-- SIZE USING RADIO -->
        Size:<br>
        <input type="radio" name="size"> Small
        <input type="radio" name="size"> Medium
        <input type="radio" name="size"> Large<br><br>

        Outlet:<br>
        <select>
            <option>Select outlet</option>
            <option>Delhi</option>
            <option>Mumbai</option>
            <option>Chandigarh</option>
        </select><br><br>

        <!-- MENU WITH IMAGES -->
        Menu:<br><br>

        <input type="radio" name="pizza">
        Hawaiian 150₹
        <img src="https://tse3.mm.bing.net/th/id/OIP.E8z51u5ZmQOTGEQhSpk6twHaHa?pid=Api&P=0&h=180" width="80"><br><br>

        <input type="radio" name="pizza">
        Pepperoni 200 ₹
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d1/Pepperoni_pizza.jpg" width="80"><br><br>

        <input type="radio" name="pizza">
        Veggie 180 ₹
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Pizza-3007395.jpg" width="80"><br><br>

        Address:<br>
        <textarea placeholder="Enter delivery address"></textarea><br><br>

        <input type="submit" value="Order Now">

    </form>

</body>
</html>
